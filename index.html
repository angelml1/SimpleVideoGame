<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Character encoding -->
    <meta charset="UTF-8">

    <!-- Makes layout responsive  -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Browser tab title -->
    <title>Connect 4</title>

    <!-- External stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Main game heading -->
    <h1>Connect 4</h1>

    <!-- Shows current turn -->
    <p id="turn-info">Player 1's Turn (Red)</p>

    <!-- Resets the game board -->
    <button id="restart-btn">Restart Game</button>

    <!-- Grid container where JS creates the cells -->
    <div id="board"></div>

    <!-- Game logic script -->
    <script src="script.js"></script>
</body>
</html>
